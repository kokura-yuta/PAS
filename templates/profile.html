<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f6f6f3">
    <title>PAS Profile</title>
    <link rel="manifest" href="/static/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/static/icons/icon-180.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="theme-{{ settings.theme_name }}">
    <main class="page">
        <h1>プロフィール</h1>

        <form class="profile-form" method="post" action="/profile">
            <section class="form-section">
                <h2>基本情報</h2>

                <div class="field">
                    <label>名前</label>
                    <input type="text" name="name" value="{{ profile.name if profile else '' }}">
                </div>

                <div class="field">
                    <label>学年・立場</label>
                    <input type="text" name="school_year" value="{{ profile.school_year if profile else '' }}">
                </div>
            </section>

            <section class="form-section">
                <h2>現在</h2>

                <div class="field">
                    <label>今取り組んでいること</label>
                    <textarea name="current_focus">{{ profile.current_focus if profile else '' }}</textarea>
                </div>

                <div class="field">
                    <label>人生で向かいたい方向性</label>
                    <textarea name="life_direction">{{ profile.life_direction if profile else '' }}</textarea>
                </div>
            </section>

            <section class="form-section">
                <h2>価値観</h2>

                <div class="field">
                    <label>大切にしている考え方</label>
                    <textarea name="values">{{ profile.values if profile else '' }}</textarea>
                </div>

                <div class="field">
                    <label>苦手なこと・避けたいこと</label>
                    <textarea name="weaknesses">{{ profile.weaknesses if profile else '' }}</textarea>
                </div>

                <div class="field">
                    <label>興味があること</label>
                    <textarea name="interests">{{ profile.interests if profile else '' }}</textarea>
                </div>

                <div class="field">
                    <label>PASにどう接してほしいか</label>
                    <textarea name="communication_preference">{{ profile.communication_preference if profile else '' }}</textarea>
                </div>
            </section>

            <section class="form-section">
                <h2>成功体験</h2>

                <div class="field">
                    <label>今までで一番の成功体験</label>
                    <textarea name="best_success_experience">{{ profile.best_success_experience if profile else '' }}</textarea>
                </div>

                <div class="field">
                    <label>そこまでの道のり</label>
                    <textarea name="success_journey">{{ profile.success_journey if profile else '' }}</textarea>
                </div>

                <div class="field">
                    <label>その時に感じたこと</label>
                    <textarea name="success_feelings">{{ profile.success_feelings if profile else '' }}</textarea>
                </div>

                <div class="field">
                    <label>そこから学んだこと</label>
                    <textarea name="success_lessons">{{ profile.success_lessons if profile else '' }}</textarea>
                </div>
            </section>

            <button type="submit">保存</button>
        </form>

        <a class="back-link" href="/">ホームへ戻る</a>
    </main>
    <script src="/static/pwa-register.js" defer></script>
</body>
</html>
