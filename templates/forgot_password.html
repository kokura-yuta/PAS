<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study PAS Password Reset</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="theme-{{ settings.theme_name }}">
    <main class="auth-page">
        <section class="auth-panel">
            <p class="eyebrow">Study PAS</p>
            <h1>パスワード再設定</h1>
            <p class="lead">登録したメールアドレスに、再設定用のリンクを送ります。</p>

            {% if error %}
                <p class="form-error">{{ error }}</p>
            {% endif %}

            {% if message %}
                <p class="form-success">{{ message }}</p>
            {% endif %}

            {% if reset_url %}
                <div class="dev-reset-link">
                    <span>開発用リンク</span>
                    <a href="{{ reset_url }}">{{ reset_url }}</a>
                </div>
            {% endif %}

            <form method="post" action="/forgot-password">
                <div class="field">
                    <label>メールアドレス</label>
                    <input type="email" name="email" value="{{ email }}" autocomplete="email" required>
                </div>

                <button type="submit">再設定リンクを送る</button>
            </form>

            <p class="auth-switch">
                思い出した場合は <a href="/login">ログインへ戻る</a>
            </p>
        </section>
    </main>
</body>
</html>
