<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAS Memories</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="theme-{{ settings.theme_name }}">
    <main class="page">
        <h1>長期記憶</h1>

        {% if memories %}
            <ul>
                {% for memory in memories %}
                    <li>
                        <strong>[{{ memory.category }}]</strong>
                        {{ memory.content }}
                        <br>
                        <small>
                            重要度: {{ memory.importance }}
                            / 確信度: {{ memory.confidence }}
                            / 情報源: {{ memory.source_type }}
                        </small>

                        <form method="post" action="/memories/{{ memory.id }}/delete">
                            <button type="submit">削除</button>
                        </form>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>まだ長期記憶はありません。</p>
        {% endif %}

        <a class="back-link" href="/">ホームへ戻る</a>
    </main>
</body>
</html>
