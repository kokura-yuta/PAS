<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f6f6f3">
    <title>Study PAS New Password</title>
    <link rel="manifest" href="/static/manifest.webmanifest">
    <link rel="icon" type="image/png" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-180.png">
    <link rel="stylesheet" href="/static/style.css?v={{ asset_version|default('') }}">
</head>
<body class="theme-{{ settings.theme_name }}">
    <main class="auth-page">
        <section class="auth-panel">
            <p class="eyebrow">Study PAS</p>
            <h1>新しいパスワード</h1>
            <p class="lead">
                {% if email %}
                    {{ email }} のパスワードを変更します。
                {% else %}
                    再設定リンクを確認してください。
                {% endif %}
            </p>

            {% if error %}
                <p class="form-error">{{ error }}</p>
            {% endif %}

            {% if message %}
                <p class="form-success">{{ message }}</p>
            {% endif %}

            {% if token %}
                <form method="post" action="/reset-password">
                    <input type="hidden" name="token" value="{{ token }}">

                    <div class="field">
                        <label for="new-password">新しいパスワード</label>
                        <input id="new-password" type="password" name="password" autocomplete="new-password" minlength="8" aria-describedby="new-password-hint" required>
                        <p id="new-password-hint" class="field-hint">8文字以上で設定してください。</p>
                    </div>

                    <button type="submit">パスワードを変更する</button>
                </form>
            {% endif %}

            <p class="auth-switch">
                <a href="/login">ログインへ戻る</a>
            </p>
        </section>
    </main>
    <script src="/static/pwa-register.js?v={{ asset_version|default('') }}" defer></script>
</body>
</html>
