<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAS Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="theme-{{ settings.theme_name }}">
    <main class="auth-page">
        <section class="auth-panel">
            <p class="eyebrow">Personal AI System</p>
            <h1>ログイン</h1>
            <p class="lead">自分専用のPASに戻ります。</p>

            {% if error %}
                <p class="form-error">{{ error }}</p>
            {% endif %}

            <form method="post" action="/login">
                <div class="field">
                    <label>メールアドレス</label>
                    <input type="email" name="email" value="{{ email }}" autocomplete="email" required>
                </div>

                <div class="field">
                    <label>パスワード</label>
                    <input type="password" name="password" autocomplete="current-password" required>
                </div>

                <button type="submit">ログイン</button>
            </form>

            <p class="auth-switch subtle-auth-link">
                <a href="/forgot-password">パスワードを忘れた方はこちら</a>
            </p>

            <p class="auth-switch">
                まだアカウントがない場合は <a href="/signup">新規登録</a>
            </p>
        </section>
    </main>
</body>
</html>
