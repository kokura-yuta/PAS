<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f6f6f3">
    <title>ログイン | Study PAS</title>
    <link rel="manifest" href="/static/manifest.webmanifest">
    <link rel="icon" type="image/png" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-180.png">
    <link rel="stylesheet" href="/static/style.css?v={{ asset_version|default('') }}">
</head>
<body class="theme-{{ settings.theme_name }}">
    <main class="auth-page">
        <section class="auth-panel">
            <p class="eyebrow">Study PAS</p>
            <h1>ログイン</h1>
            <p class="lead">自分専用の先生との続きを始めます。</p>

            {% if error %}
                <p class="form-error" role="alert">{{ error }}</p>
            {% endif %}

            <form method="post" action="/login">
                <div class="field">
                    <label for="login-email">メールアドレス</label>
                    <input id="login-email" type="email" name="email" value="{{ email }}" autocomplete="email" maxlength="255" required>
                </div>

                <div class="field">
                    <label for="login-password">パスワード</label>
                    <input id="login-password" type="password" name="password" autocomplete="current-password" required>
                </div>

                <label class="remember-option">
                    <input
                        type="checkbox"
                        name="remember_login"
                        value="on"
                        {% if remember_login %}checked{% endif %}
                    >
                    <span>この端末でログイン状態を保持する</span>
                </label>

                <button type="submit">ログイン</button>
            </form>

            <p class="auth-switch subtle-auth-link">
                <a href="/forgot-password">パスワードを忘れた方はこちら</a>
            </p>

            <p class="auth-switch">
                まだアカウントがない場合は <a href="/signup">新規登録</a>
            </p>
        </section>
    </main>
    <script src="/static/pwa-register.js?v={{ asset_version|default('') }}" defer></script>
</body>
</html>
