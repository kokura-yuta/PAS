<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAS Sign Up</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="theme-{{ settings.theme_name }}">
    <main class="auth-page">
        <section class="auth-panel">
            <p class="eyebrow">Personal AI System</p>
            <h1>新規登録</h1>
            <p class="lead">PASがあなた専用の記憶を持てるようにします。</p>

            {% if error %}
                <p class="form-error">{{ error }}</p>
            {% endif %}

            <form method="post" action="/signup">
                <div class="field">
                    <label>名前</label>
                    <input type="text" name="name" value="{{ name }}" autocomplete="name" required>
                </div>

                <div class="field">
                    <label>メールアドレス</label>
                    <input type="email" name="email" value="{{ email }}" autocomplete="email" required>
                </div>

                <div class="field">
                    <label>パスワード</label>
                    <input type="password" name="password" autocomplete="new-password" minlength="8" required>
                </div>

                <button type="submit">登録する</button>
            </form>

            <p class="auth-switch">
                すでにアカウントがある場合は <a href="/login">ログイン</a>
            </p>
        </section>
    </main>
</body>
</html>
